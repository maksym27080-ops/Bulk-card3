    <style>
        /* ОСНОВНІ СТИЛІ */
        body {
            background-color: #080807;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: sticky;
            top: 0;
            background: rgba(8, 8, 7, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-text { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 4px; color: #fffaf0; text-transform: uppercase; }
        
        nav { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 50px; padding: 8px 30px; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: #888; font-size: 13px; font-weight: 500; transition: 0.3s; cursor: pointer; }
        nav a:hover, nav a.active { color: #ffffff; }

        .mason-signature {
            text-decoration: none;
            color: white;
            opacity: 0.6;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .mason-signature:hover {
            opacity: 1;
            text-shadow: 0 0 8px #fff, 0 0 15px #fff;
        }

        .main-content { padding: 40px 50px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }

        .card-item {
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .card-item img { width: 100%; display: block; }
        .card-item:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); }

        /* ЛАЙТБОКС */
        #lightbox {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s ease;
            z-index: 1000;
        }

        #lightbox.active { opacity: 1; visibility: visible; }

        .lightbox-glow-container {
            position: relative;
            padding: 2px;
            border-radius: 34px;
            background: linear-gradient(135deg, #ffae42, rgba(255, 174, 66, 0.1), #ffae42);
            box-shadow: 0 0 60px rgba(255, 174, 66, 0.2);
            max-width: 420px;
            width: 90%;
            transition: 0.4s;
        }

        /* КАТЕГОРІЇ СЯЙВА */
        .moderator-glow {
            background: linear-gradient(135deg, #ff0000, rgba(255, 0, 0, 0.1), #ff0000) !important;
            box-shadow: 0 0 70px rgba(255, 0, 0, 0.4) !important;
        }
        .bulker-glow {
            background: linear-gradient(135deg, #2e7d32, rgba(46, 125, 50, 0.1), #2e7d32) !important;
            box-shadow: 0 0 70px rgba(46, 125, 50, 0.4) !important;
        }
        .og-glow {
            background: linear-gradient(135deg, #a0522d, rgba(160, 82, 45, 0.1), #ff8c00) !important;
            box-shadow: 0 0 70px rgba(160, 82, 45, 0.4) !important;
        }
        .contributor-glow {
            background: linear-gradient(135deg, #00bfff, rgba(0, 191, 255, 0.1), #00bfff) !important;
            box-shadow: 0 0 70px rgba(0, 191, 255, 0.4) !important;
        }

        .lightbox-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 25px;
            text-align: center;
            position: relative;
        }

        .card-detail-img { width: 100%; border-radius: 20px; margin-bottom: 20px; }
        .card-name { font-family: 'Cinzel', serif; font-size: 26px; margin: 10px 0 5px; }
        .card-username { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 15px; }
        .card-bio { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); }

        .card-tags { display: flex; justify-content: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
        .tag { padding: 5px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; font-size: 11px; background: rgba(255,255,255,0.05); color: #ccc; }

        .follow-btn {
            background: white; color: black; border: none; padding: 10px 40px;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 25px;
        }
        .follow-btn:hover { transform: scale(1.05); background: #f0f0f0; }

        .footer-logo { margin-top: 25px; font-size: 11px; opacity: 0.3; letter-spacing: 2px; }

        @media (max-width: 768px) { .gallery-grid { grid-template-columns: 1fr; } }
    </style>
</head>

<div id="lightbox">
    <div class="lightbox-glow-container" id="glow-box">
        <div class="lightbox-card">
            <img id="detail-img" class="card-detail-img" src="" alt="">
            <h2 class="card-name" id="detail-name">Name</h2>
            <div class="card-username" id="detail-user">@username</div>
            <p class="card-bio" id="detail-bio">Bio text...</p>
            
            <button class="follow-btn" id="follow-link">follow</button>

            <div class="card-tags" id="detail-tags"></div>
            
            <div class="footer-logo">by mason</div>
        </div>
    </div>
</div>

<script>
    const navLinks = document.querySelectorAll('#category-nav a');
    const cards = document.querySelectorAll('.card-item');
    const lightbox = document.getElementById('lightbox');
    const glowBox = document.getElementById('glow-box');
    const followBtn = document.getElementById('follow-link');
    
    const dImg = document.getElementById('detail-img');
    const dName = document.getElementById('detail-name');
    const dUser = document.getElementById('detail-user');
    const dBio = document.getElementById('detail-bio');
    const dTags = document.getElementById('detail-tags');

    let currentTwitterUrl = "";

    // Фільтрація
    navLinks.forEach(link => {
        link.addEventListener('click', (e) => {
            e.preventDefault();
            navLinks.forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            const filter = link.getAttribute('data-filter');
            cards.forEach(card => {
                const cat = card.getAttribute('data-category');
                card.style.display = (filter === 'all' || filter === cat) ? 'block' : 'none';
            });
        });
    });

    // Відкриття лайтбоксу
    cards.forEach(card => {
        card.addEventListener('click', () => {
            const category = card.getAttribute('data-category');
            dName.innerText = card.getAttribute('data-name');
            dUser.innerText = card.getAttribute('data-user');
            dBio.innerText = card.getAttribute('data-bio');
            dImg.src = card.getAttribute('data-full-img');
            
            // Зберігаємо посилання на твіттер конкретної картки
            currentTwitterUrl = card.getAttribute('data-twitter');

            // Теги
            dTags.innerHTML = '';
            const tagsAttr = card.getAttribute('data-tags');
            if (tagsAttr) {
                tagsAttr.split(',').forEach(t => {
                    const span = document.createElement('span');
                    span.className = 'tag';
                    span.innerText = t.trim();
                    dTags.appendChild(span);
                });
            }

            // Кольори світіння
            glowBox.className = 'lightbox-glow-container';
            if (category === 'moderator') glowBox.classList.add('moderator-glow');
            if (category === 'bulker') glowBox.classList.add('bulker-glow');
            if (category === 'og') glowBox.classList.add('og-glow');
            if (category === 'contributor') glowBox.classList.add('contributor-glow');

            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        });
    });

    // Логіка кнопки Follow
    followBtn.addEventListener('click', () => {
        if (currentTwitterUrl && currentTwitterUrl !== "") {
            window.open(currentTwitterUrl, '_blank');
        } else {
            alert("Посилань на Twitter ще немає для цього учасника.");
        }
    });

    // Закриття лайтбоксу
    lightbox.addEventListener('click', (e) => {
        if (e.target === lightbox) {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
    });
</script>
